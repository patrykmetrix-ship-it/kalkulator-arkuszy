<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#174c4f">
    <meta name="description" content="Mobilny kalkulator wagi i ilości arkuszy blach.">
    <title>Kalkulator arkuszy blach</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <header class="topbar">
        <div class="brand-mark" aria-hidden="true">
          <span></span>
        </div>
        <div>
          <p class="eyebrow">Przelicznik waga / arkusze</p>
          <h1 id="app-title">Kalkulator blach</h1>
        </div>
      </header>

      <section class="mode-control" aria-label="Tryb obliczeń">
        <button class="mode-button is-active" type="button" data-mode="kg-to-sheets">
          Kg na ark.
        </button>
        <button class="mode-button" type="button" data-mode="sheets-to-kg">
          Ark. na kg
        </button>
      </section>

      <form class="calculator" id="calculator" novalidate>
        <section class="input-panel">
          <div class="field field-main" id="weight-field">
            <label for="weight">Waga do przeliczenia</label>
            <div class="input-with-unit">
              <input id="weight" name="weight" type="text" inputmode="decimal" autocomplete="off" placeholder="np. 100">
              <span>kg</span>
            </div>
          </div>

          <div class="field field-main is-hidden" id="sheet-count-field">
            <label for="sheet-count">Liczba arkuszy</label>
            <div class="input-with-unit">
              <input id="sheet-count" name="sheet-count" type="text" inputmode="decimal" autocomplete="off" placeholder="np. 2">
              <span>ark.</span>
            </div>
          </div>

          <div class="field">
            <label for="material">Materiał</label>
            <select id="material" name="material">
              <option value="czarna">Blacha czarna</option>
              <option value="nierdzewka">Nierdzewka</option>
              <option value="ocynk-alucynk">Ocynk / alucynk</option>
              <option value="miedz">Miedź</option>
              <option value="aluminium">Aluminium</option>
            </select>
          </div>

          <div class="field">
            <label for="thickness">Grubość</label>
            <div class="input-with-unit">
              <input id="thickness" name="thickness" type="text" inputmode="decimal" autocomplete="off" placeholder="np. 2">
              <span>mm</span>
            </div>
          </div>
        </section>

        <section class="format-panel" aria-labelledby="format-title">
          <div class="section-heading">
            <h2 id="format-title">Format arkusza</h2>
          </div>

          <div class="format-grid" role="radiogroup" aria-label="Format arkusza">
            <label class="format-option">
              <input type="radio" name="format" value="small">
              <span>
              <strong>Mały</strong>
                1000 x 2000 mm
              </span>
            </label>
            <label class="format-option">
              <input type="radio" name="format" value="medium" checked>
              <span>
                <strong>Średni</strong>
                1250 x 2500 mm
              </span>
            </label>
            <label class="format-option">
              <input type="radio" name="format" value="xlarge">
              <span>
                <strong>Xduży</strong>
                1500 x 3000 mm
              </span>
            </label>
            <label class="format-option">
              <input type="radio" name="format" value="custom">
              <span>
                <strong>Własny</strong>
                wpisz wymiary
              </span>
            </label>
          </div>

          <div class="custom-size" id="custom-size" hidden>
            <div class="field">
              <label for="custom-width">Szerokość</label>
              <div class="input-with-unit">
                <input id="custom-width" name="custom-width" type="text" inputmode="decimal" autocomplete="off" placeholder="np. 1000">
                <span>mm</span>
              </div>
            </div>
            <div class="field">
              <label for="custom-length">Długość</label>
              <div class="input-with-unit">
                <input id="custom-length" name="custom-length" type="text" inputmode="decimal" autocomplete="off" placeholder="np. 2000">
                <span>mm</span>
              </div>
            </div>
          </div>
        </section>
      </form>

      <section class="result-panel" aria-live="polite" aria-label="Wynik obliczeń">
        <p class="result-label" id="result-label">Wynik</p>
        <div class="result-main" id="result-main">Wpisz dane</div>
        <div class="result-secondary" id="result-secondary">
          Przykład: 2 mm, blacha czarna, 1250 x 2500 mm = 50 kg / ark.
        </div>
      </section>

      <section class="reference-strip" aria-label="Współczynniki materiałów">
        <div>
          <span>Czarna</span>
          <strong>8</strong>
        </div>
        <div>
          <span>Nierdz.</span>
          <strong>8</strong>
        </div>
        <div>
          <span>Ocynk</span>
          <strong>8</strong>
        </div>
        <div>
          <span>Miedź</span>
          <strong>9</strong>
        </div>
        <div>
          <span>Alu</span>
          <strong>2,7</strong>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
